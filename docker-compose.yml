version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine  # Lightweight PostgreSQL 15 image
    container_name: ecommerce_db
    environment:
      # Database credentials - you'll use these in DBeaver
      POSTGRES_USER: ecommerce_user
      POSTGRES_PASSWORD: ecommerce_pass
      POSTGRES_DB: ecommerce_db
    ports:
      # Expose PostgreSQL on localhost:5432 for DBeaver connection
      - "5432:5432"
    volumes:
      # Persist database data even when container is stopped
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ensure DB is ready before starting backend
      test: ["CMD-SHELL", "pg_isready -U ecommerce_user -d ecommerce_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    ports:
      # API available at http://localhost:8000
      - "8000:8000"
    environment:
      # Connection string: postgresql://user:password@host:port/database
      DATABASE_URL: postgresql://ecommerce_user:ecommerce_pass@db:5432/ecommerce_db
      # Allow frontend to call API (CORS)
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      DEBUG: "True"
    depends_on:
      db:
        condition: service_healthy  # Wait for DB to be ready
    volumes:
      # Hot reload - changes reflect immediately
      - ./backend:/app
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # React Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    ports:
      # Frontend available at http://localhost:5173
      - "5173:5173"
    environment:
      # Backend API URL for frontend to call
      VITE_API_URL: http://localhost:8000
    volumes:
      # Hot reload for frontend too
      - ./frontend:/app
      - /app/node_modules  # Prevent overwriting node_modules
    command: npm run dev -- --host

# Named volume for database persistence
volumes:
  postgres_data:
